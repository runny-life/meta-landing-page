<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Frontend Mentor | Meet landing page</title>
  </head>
  <body>
    <header class="header">
      <a href="#" class="logo">
        <img
          src="./assets/logo.svg"
          alt="Meta"
          width="118"
          height="28"
          aria-label="home"
        />
      </a>
    </header>
    <main class="content">
      <section
        class="hero"
        aria-labelledby="hero-title"
        aria-describedby="hero-description"
      >
        <div class="hero__image-wrapper">
          <img
            class="hero__image-mobile"
            src="./assets/tablet/image-hero.png"
            alt=""
            width="820"
            height="303"
          />
          <img
            class="hero__image hero__image--left"
            src="./assets/desktop/image-hero-left.png"
            alt=""
            width="394"
            height="303"
          />
          <img
            class="hero__image hero__image--right"
            src="./assets/desktop/image-hero-right.png"
            alt=""
            width="394"
            height="303"
          />
        </div>
        <div class="hero__inner container">
          <div class="hero__info">
            <h1 class="hero__title text-preset-1" id="hero-title">
              Group Chat for Everyone
            </h1>
            <p class="hero__description text-preset-4">
              Meet makes it easy to connect with others face-to-face virtually
              and collaborate across any device.
            </p>
          </div>
          <div class="hero__actions">
            <a class="link-button link-button--cyan text-preset-5" download="">
              Download <span>v1.3</span>
            </a>
            <a class="link-button text-preset-5" href="#">What is it?</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
